name: Build Bootlin-based LLVM Toolchain

on:
  workflow_dispatch:
    inputs:
      buildroot_version:
        description: 'Buildroot Version (e.g. 2026.02.3)'
        required: true
        default: '2026.02.3'
      bootlin_version:
        description: 'Bootlin Stable Version (e.g. 2026.02-1)'
        required: true
        default: '2026.02-1'
      llvm_version:
        description: 'LLVM Version (e.g. 22.1.8)'
        required: true
        default: '22.1.8'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build python3-dev xz-utils curl ccache

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ github.event.inputs.llvm_version }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ github.event.inputs.llvm_version }}-

      - name: Download Bootlin Toolchain
        run: |
          sudo mkdir -p /opt/toolchain
          sudo chown runner:runner /opt/toolchain
          curl -fsSL "https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--musl--stable-${{ github.event.inputs.bootlin_version }}.tar.xz" | tar -xJ --strip-components=1 -C /opt/toolchain

      - name: Clone LLVM Project
        run: |
          git clone --depth 1 --branch llvmorg-${{ github.event.inputs.llvm_version }} https://github.com/llvm/llvm-project.git llvm-project

      - name: Clone SPIRV-LLVM-Translator
        run: |
          LLVM_MAJOR=$(echo "${{ github.event.inputs.llvm_version }}" | cut -d. -f1)
          git clone --depth 1 --branch llvm_release_${LLVM_MAJOR}0 https://github.com/KhronosGroup/SPIRV-LLVM-Translator.git SPIRV-LLVM-Translator
          cd SPIRV-LLVM-Translator
          echo "SPIRV_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Setup Compiler Environment
        run: |
          # Add Bootlin toolchain to PATH
          echo "/opt/toolchain/bin" >> $GITHUB_PATH

      # Step 1: Build Host LLVM/Clang/LLD
      - name: Build Host LLVM
        run: |
          cmake -S llvm-project/llvm -B llvm-project/build-host \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/opt/toolchain \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="AArch64;X86" \
            -DLLVM_DEFAULT_TARGET_TRIPLE="aarch64-buildroot-linux-musl" \
            -DLLVM_BUILD_LLVM_DYLIB=ON \
            -DLLVM_LINK_LLVM_DYLIB=ON \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_ENABLE_BINDINGS=OFF
          ninja -C llvm-project/build-host install

      # Step 2: Build Host SPIRV-LLVM-Translator
      - name: Build Host SPIRV-LLVM-Translator
        run: |
          cmake -S SPIRV-LLVM-Translator -B SPIRV-LLVM-Translator/build-host \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/opt/toolchain \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DLLVM_DIR=/opt/toolchain/lib/cmake/llvm
          ninja -C SPIRV-LLVM-Translator/build-host install

      # Step 3: Build libclc (OpenCL C builtins compiled to SPIR-V bitcode)
      - name: Build libclc
        run: |
          cmake -S llvm-project/libclc -B llvm-project/build-libclc \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/opt/toolchain/aarch64-buildroot-linux-musl/sysroot/usr \
            -DLIBCLC_TARGETS_TO_BUILD="spirv-mesa3d-;spirv64-mesa3d-" \
            -DLLVM_CONFIG_PATH=/opt/toolchain/bin/llvm-config \
            -DCCACHE_CONFIG=""
          ninja -C llvm-project/build-libclc install

      # Step 4: Cross-Compile Target LLVM/Clang (installs libLLVM.so to sysroot)
      - name: Cross-Compile Target LLVM
        run: |
          cmake -S llvm-project/llvm -B llvm-project/build-target \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/opt/toolchain/aarch64-buildroot-linux-musl/sysroot/usr \
            -DCMAKE_CROSSCOMPILING=True \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=AArch64 \
            -DCMAKE_C_COMPILER=/opt/toolchain/bin/aarch64-linux-gcc \
            -DCMAKE_CXX_COMPILER=/opt/toolchain/bin/aarch64-linux-g++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_SYSROOT=/opt/toolchain/aarch64-buildroot-linux-musl/sysroot \
            -DLLVM_TABLEGEN=/opt/toolchain/bin/llvm-tblgen \
            -DCLANG_TABLEGEN=/opt/toolchain/bin/clang-tblgen \
            -DLLVM_ENABLE_PROJECTS="clang" \
            -DLLVM_TARGETS_TO_BUILD="AArch64" \
            -DLLVM_DEFAULT_TARGET_TRIPLE="aarch64-buildroot-linux-musl" \
            -DLLVM_BUILD_LLVM_DYLIB=ON \
            -DLLVM_LINK_LLVM_DYLIB=ON \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_ZSTD=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_LIBXML2=OFF \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_ENABLE_BINDINGS=OFF
          ninja -C llvm-project/build-target install

      # Step 5: Cross-Compile Target SPIRV-LLVM-Translator (installs libLLVMSPIRVLib.so to sysroot)
      - name: Cross-Compile Target SPIRV-LLVM-Translator
        run: |
          cmake -S SPIRV-LLVM-Translator -B SPIRV-LLVM-Translator/build-target \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/opt/toolchain/aarch64-buildroot-linux-musl/sysroot/usr \
            -DCMAKE_CROSSCOMPILING=True \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=AArch64 \
            -DCMAKE_C_COMPILER=/opt/toolchain/bin/aarch64-linux-gcc \
            -DCMAKE_CXX_COMPILER=/opt/toolchain/bin/aarch64-linux-g++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_SYSROOT=/opt/toolchain/aarch64-buildroot-linux-musl/sysroot \
            -DLLVM_DIR=/opt/toolchain/aarch64-buildroot-linux-musl/sysroot/usr/lib/cmake/llvm
          ninja -C SPIRV-LLVM-Translator/build-target install

      - name: Package SDK
        run: |
          cd /opt
          tar -cJf /tmp/aarch64-musl-llvm-toolchain-${{ github.event.inputs.llvm_version }}.tar.xz toolchain

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.buildroot_version }}-bootlin${{ github.event.inputs.bootlin_version }}-llvm${{ github.event.inputs.llvm_version }}-spirv${{ env.SPIRV_SHA }}"
          name: "Buildroot ${{ github.event.inputs.buildroot_version }} + Bootlin ${{ github.event.inputs.bootlin_version }} + LLVM ${{ github.event.inputs.llvm_version }} (SPIR-V ${{ env.SPIRV_SHA }})"
          body: |
            Pre-built, relocatable ARM64 Musl toolchain.
            * Cloned Buildroot version: `${{ github.event.inputs.buildroot_version }}`
            * Based on Bootlin version: `${{ github.event.inputs.bootlin_version }}`
            * Integrated LLVM/Clang/LLD version `${{ github.event.inputs.llvm_version }}` (Host + Target)
            * Integrated libclc (SPIR-V targets)
            * Integrated SPIRV-LLVM-Translator version `${{ env.SPIRV_SHA }}` (Host + Target)
          files: /tmp/aarch64-musl-llvm-toolchain-${{ github.event.inputs.llvm_version }}.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
