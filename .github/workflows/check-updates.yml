name: Check Buildroot Releases

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      buildroot_version:
        description: 'Buildroot release tag to check/build. Defaults to latest stable tag.'
        required: false

permissions:
  contents: read
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Buildroot release
        id: buildroot
        env:
          REQUESTED_BUILDROOT: ${{ inputs.buildroot_version }}
        run: |
          set -euo pipefail
          if [ -n "${REQUESTED_BUILDROOT:-}" ]; then
            latest="$REQUESTED_BUILDROOT"
          else
            latest="$(git ls-remote --tags --refs https://github.com/buildroot/buildroot.git \
              | awk '{print $2}' \
              | sed 's#refs/tags/##' \
              | grep -E '^[0-9]{4}\.[0-9]{2}(\.[0-9]+)?$' \
              | sort -Vr \
              | head -n 1)"
          fi
          : "${latest:?Could not determine Buildroot release}"
          echo "version=$latest" >> "$GITHUB_OUTPUT"
          echo "Buildroot release: $latest"

      - name: Trigger missing flavor builds
        uses: actions/github-script@v7
        env:
          BUILDROOT_VERSION: ${{ steps.buildroot.outputs.version }}
        with:
          script: |
            const buildrootVersion = process.env.BUILDROOT_VERSION;
            const flavors = ['bootlin-musl', 'arm-glibc'];

            for (const flavor of flavors) {
              const releaseTag = `${flavor}-${buildrootVersion}`;
              let exists = false;
              try {
                await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag: releaseTag,
                });
                exists = true;
              } catch (error) {
                if (error.status !== 404) throw error;
              }

              if (exists) {
                core.info(`Release ${releaseTag} already exists; no rebuild needed.`);
                continue;
              }

              core.info(`Release ${releaseTag} is missing; dispatching ${flavor} build.`);
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'build-prebuilt-llvm.yml',
                ref: flavor,
                inputs: {
                  buildroot_version: buildrootVersion,
                  revision: 'r1',
                  flavor,
                },
              });
            }
